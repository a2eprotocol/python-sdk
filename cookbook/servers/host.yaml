host_id: "a2e-dev"

# ─────────────────────────────────────────────
# Transport configuration
#
# You can choose between:
#
# 1. DirectTransport (in-process, no network)
#    transport:
#      type: direct
#      config: {}
#
# 2. SubprocessTransport (stdin/stdout subprocess)
#    transport:
#      type: subprocess
#      config:
#        command: "python3 -m my_host_module"
#        env:
#          PYTHONUNBUFFERED: "1"
#        cwd: "/app"
#
# 3. HTTPTransport (network — default below)
#    transport:
#      type: http
#      config:
#        base_url: "http://localhost:8765"
#        send_path: "/send"
#        stream_path: "/stream"
# ─────────────────────────────────────────────

snapshot_store:
  type: file
  config:
    root: "/tmp/a2e"

plugins:
  - name: skills
    cls: a2e.plugins.skills.SkillPlugin
    config:
      root: "./skills"
      pool_size: 4

  - name: memory
    cls: a2e.plugins.memory.MemoryPlugin
    config:
      episodic_db_path: "/data/episodic.db"
      semantic_db_path: "/data/semantic.db"

  - name: learning
    cls: a2e.plugins.learning.LearningPlugin
    config:
      strategy: "ucb1"

  - name: tools
    cls: a2e.plugins.tools.ToolPlugin
    config:
      allowed_tools: ["shell", "python_eval"]
