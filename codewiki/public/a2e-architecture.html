<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A2E Protocol Architecture Diagram</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      background: #020617;
      color: white;
    }
    svg {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    #fullscreen-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 100;
      width: 40px; height: 40px;
      border-radius: 8px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid #1e293b;
      color: #94a3b8;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: 'JetBrains Mono', monospace;
    }
    #fullscreen-btn:hover {
      background: rgba(48, 54, 61, 0.9);
      color: #e6edf3;
    }
    #fullscreen-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99;
      color: #475569;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }
    body:not(.fs-hint-hidden) #fullscreen-hint {
      opacity: 1;
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 1100 820" preserveAspectRatio="xMidYMid meet">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
      </marker>
      <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff" />
      </marker>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
      </pattern>
    </defs>

    <rect width="100%" height="100%" fill="url(#grid)" />

    <!-- Title -->
    <text x="550" y="28" fill="#58a6ff" font-size="16" font-weight="700" text-anchor="middle">A2E Protocol Architecture</text>

    <!-- Agent (top) -->
    <rect x="470" y="40" width="160" height="50" rx="8" fill="rgba(188, 140, 255, 0.15)" stroke="#bc8cff" stroke-width="2"/>
    <text x="550" y="62" fill="#bc8cff" font-size="13" font-weight="700" text-anchor="middle">AI Agent</text>
    <text x="550" y="78" fill="#94a3b8" font-size="9" text-anchor="middle">LLM · Codex · Claude</text>

    <!-- Arrow: Agent connects to Host -->
    <line x1="550" y1="90" x2="550" y2="130" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
    <text x="565" y="114" fill="#58a6ff" font-size="9">Handshake</text>

    <!-- Layer 1: Protocol Layer -->
    <rect x="60" y="135" width="980" height="115" rx="10" fill="rgba(88, 166, 255, 0.06)" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="80" y="155" fill="#58a6ff" font-size="11" font-weight="600">Layer 1: Protocol Layer</text>

    <rect x="90" y="168" width="195" height="68" rx="6" fill="rgba(88, 166, 255, 0.12)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="187" y="190" fill="white" font-size="11" font-weight="600" text-anchor="middle">A2EMessage</text>
    <text x="187" y="206" fill="#94a3b8" font-size="9" text-anchor="middle">Pydantic v2 · Typed</text>
    <text x="187" y="220" fill="#94a3b8" font-size="9" text-anchor="middle">req/resp/event patterns</text>

    <rect x="315" y="168" width="195" height="68" rx="6" fill="rgba(88, 166, 255, 0.12)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="412" y="190" fill="white" font-size="11" font-weight="600" text-anchor="middle">NDJSON Wire Format</text>
    <text x="412" y="206" fill="#94a3b8" font-size="9" text-anchor="middle">Newline-delimited JSON</text>
    <text x="412" y="220" fill="#94a3b8" font-size="9" text-anchor="middle">Streaming · Versioned</text>

    <rect x="540" y="168" width="195" height="68" rx="6" fill="rgba(88, 166, 255, 0.12)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="637" y="190" fill="white" font-size="11" font-weight="600" text-anchor="middle">TYPE_MAP Registry</text>
    <text x="637" y="206" fill="#94a3b8" font-size="9" text-anchor="middle">10 capability routes</text>
    <text x="637" y="220" fill="#94a3b8" font-size="9" text-anchor="middle">Extensible</text>

    <rect x="765" y="168" width="195" height="68" rx="6" fill="rgba(88, 166, 255, 0.12)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="862" y="190" fill="white" font-size="11" font-weight="600" text-anchor="middle">Capability Negotiation</text>
    <text x="862" y="206" fill="#94a3b8" font-size="9" text-anchor="middle">Agent declares caps</text>
    <text x="862" y="220" fill="#94a3b8" font-size="9" text-anchor="middle">Host validates</text>

    <!-- Arrow: Protocol → Runtime -->
    <line x1="550" y1="250" x2="550" y2="280" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="565" y="268" fill="#3fb950" font-size="9">Dispatches to</text>

    <!-- Layer 2: Runtime Layer -->
    <rect x="60" y="285" width="980" height="115" rx="10" fill="rgba(63, 185, 80, 0.06)" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="80" y="305" fill="#3fb950" font-size="11" font-weight="600">Layer 2: Runtime Layer</text>

    <rect x="90" y="318" width="170" height="68" rx="6" fill="rgba(63, 185, 80, 0.12)" stroke="#3fb950" stroke-width="1.5"/>
    <text x="175" y="340" fill="white" font-size="11" font-weight="700" text-anchor="middle">A2EServer</text>
    <text x="175" y="356" fill="#94a3b8" font-size="9" text-anchor="middle">FastAPI · Uvicorn</text>
    <text x="175" y="370" fill="#94a3b8" font-size="9" text-anchor="middle">Session management</text>

    <rect x="290" y="318" width="170" height="68" rx="6" fill="rgba(63, 185, 80, 0.12)" stroke="#3fb950" stroke-width="1.5"/>
    <text x="375" y="340" fill="white" font-size="11" font-weight="700" text-anchor="middle">A2EClient</text>
    <text x="375" y="356" fill="#94a3b8" font-size="9" text-anchor="middle">rpc() · events</text>
    <text x="375" y="370" fill="#94a3b8" font-size="9" text-anchor="middle">Capability APIs</text>

    <rect x="490" y="318" width="170" height="68" rx="6" fill="rgba(63, 185, 80, 0.12)" stroke="#3fb950" stroke-width="1.5"/>
    <text x="575" y="340" fill="white" font-size="11" font-weight="700" text-anchor="middle">PluginRegistry</text>
    <text x="575" y="356" fill="#94a3b8" font-size="9" text-anchor="middle">Dynamic load</text>
    <text x="575" y="370" fill="#94a3b8" font-size="9" text-anchor="middle">Lifecycle · Dispatch</text>

    <rect x="690" y="318" width="170" height="68" rx="6" fill="rgba(63, 185, 80, 0.12)" stroke="#3fb950" stroke-width="1.5"/>
    <text x="775" y="340" fill="white" font-size="11" font-weight="700" text-anchor="middle">AuditLog</text>
    <text x="775" y="356" fill="#94a3b8" font-size="9" text-anchor="middle">Structured audit</text>
    <text x="775" y="370" fill="#94a3b8" font-size="9" text-anchor="middle">Rotation · JSONL</text>

    <rect x="890" y="318" width="120" height="68" rx="6" fill="rgba(63, 185, 80, 0.12)" stroke="#3fb950" stroke-width="1.5"/>
    <text x="950" y="340" fill="white" font-size="11" font-weight="700" text-anchor="middle">Transports</text>
    <text x="950" y="356" fill="#94a3b8" font-size="9" text-anchor="middle">HTTP+SSE</text>
    <text x="950" y="370" fill="#94a3b8" font-size="9" text-anchor="middle">Direct</text>

    <!-- Arrow: Runtime → Capabilities -->
    <line x1="550" y1="400" x2="550" y2="430" stroke="#d29922" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="565" y="418" fill="#d29922" font-size="9">Loads & routes to</text>

    <!-- Layer 3: Capability Layer -->
    <rect x="60" y="435" width="980" height="280" rx="10" fill="rgba(210, 153, 34, 0.06)" stroke="#d29922" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="80" y="455" fill="#d29922" font-size="11" font-weight="600">Layer 3: Capability Layer — 10 Standard Plugin Namespaces</text>

    <!-- Row 1: 5 plugins -->
    <rect x="90" y="470" width="170" height="90" rx="8" fill="rgba(88, 166, 255, 0.12)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="175" y="492" fill="#58a6ff" font-size="13" font-weight="700" text-anchor="middle">tools</text>
    <text x="175" y="508" fill="#94a3b8" font-size="9" text-anchor="middle">Named functions</text>
    <text x="175" y="522" fill="#94a3b8" font-size="9" text-anchor="middle">JSON Schema I/O</text>
    <text x="175" y="544" fill="#58a6ff" font-size="8" text-anchor="middle">ToolPlugin</text>

    <rect x="280" y="470" width="170" height="90" rx="8" fill="rgba(63, 185, 80, 0.12)" stroke="#3fb950" stroke-width="1.5"/>
    <text x="365" y="492" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle">memory</text>
    <text x="365" y="508" fill="#94a3b8" font-size="9" text-anchor="middle">Working tier</text>
    <text x="365" y="522" fill="#94a3b8" font-size="9" text-anchor="middle">Episodic / Semantic</text>
    <text x="365" y="544" fill="#3fb950" font-size="8" text-anchor="middle">MemoryPlugin</text>

    <rect x="470" y="470" width="170" height="90" rx="8" fill="rgba(210, 153, 34, 0.12)" stroke="#d29922" stroke-width="1.5"/>
    <text x="555" y="492" fill="#d29922" font-size="13" font-weight="700" text-anchor="middle">env</text>
    <text x="555" y="508" fill="#94a3b8" font-size="9" text-anchor="middle">RL environments</text>
    <text x="555" y="522" fill="#94a3b8" font-size="9" text-anchor="middle">step · reset · observe</text>
    <text x="555" y="544" fill="#d29922" font-size="8" text-anchor="middle">EnvPlugin</text>

    <rect x="660" y="470" width="170" height="90" rx="8" fill="rgba(86, 187, 215, 0.12)" stroke="#56bbd7" stroke-width="1.5"/>
    <text x="745" y="492" fill="#56bbd7" font-size="13" font-weight="700" text-anchor="middle">proc</text>
    <text x="745" y="508" fill="#94a3b8" font-size="9" text-anchor="middle">Subprocesses</text>
    <text x="745" y="522" fill="#94a3b8" font-size="9" text-anchor="middle">spawn · signal · I/O</text>
    <text x="745" y="544" fill="#56bbd7" font-size="8" text-anchor="middle">ProcPlugin</text>

    <rect x="850" y="470" width="170" height="90" rx="8" fill="rgba(188, 140, 255, 0.12)" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="935" y="492" fill="#bc8cff" font-size="13" font-weight="700" text-anchor="middle">learn</text>
    <text x="935" y="508" fill="#94a3b8" font-size="9" text-anchor="middle">Feedback</text>
    <text x="935" y="522" fill="#94a3b8" font-size="9" text-anchor="middle">Experience · Adaptation</text>
    <text x="935" y="544" fill="#bc8cff" font-size="8" text-anchor="middle">LearnPlugin</text>

    <!-- Row 2: 5 plugins -->
    <rect x="90" y="575" width="170" height="90" rx="8" fill="rgba(188, 140, 255, 0.12)" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="175" y="597" fill="#bc8cff" font-size="13" font-weight="700" text-anchor="middle">skills</text>
    <text x="175" y="613" fill="#94a3b8" font-size="9" text-anchor="middle">Named execution</text>
    <text x="175" y="627" fill="#94a3b8" font-size="9" text-anchor="middle">Versioned · Sandboxed</text>
    <text x="175" y="649" fill="#bc8cff" font-size="8" text-anchor="middle">SkillPlugin</text>

    <rect x="280" y="575" width="170" height="90" rx="8" fill="rgba(86, 187, 215, 0.12)" stroke="#56bbd7" stroke-width="1.5"/>
    <text x="365" y="597" fill="#56bbd7" font-size="13" font-weight="700" text-anchor="middle">toolkits</text>
    <text x="365" y="613" fill="#94a3b8" font-size="9" text-anchor="middle">Tool bundles</text>
    <text x="365" y="627" fill="#94a3b8" font-size="9" text-anchor="middle">Shared configuration</text>
    <text x="365" y="649" fill="#56bbd7" font-size="8" text-anchor="middle">ToolkitPlugin</text>

    <rect x="470" y="575" width="170" height="90" rx="8" fill="rgba(210, 153, 34, 0.12)" stroke="#d29922" stroke-width="1.5"/>
    <text x="555" y="597" fill="#d29922" font-size="13" font-weight="700" text-anchor="middle">chains</text>
    <text x="555" y="613" fill="#94a3b8" font-size="9" text-anchor="middle">DAG pipelines</text>
    <text x="555" y="627" fill="#94a3b8" font-size="9" text-anchor="middle">Branching · Fan-out</text>
    <text x="555" y="649" fill="#d29922" font-size="8" text-anchor="middle">ChainPlugin</text>

    <rect x="660" y="575" width="170" height="90" rx="8" fill="rgba(63, 185, 80, 0.12)" stroke="#3fb950" stroke-width="1.5"/>
    <text x="745" y="597" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle">mcp</text>
    <text x="745" y="613" fill="#94a3b8" font-size="9" text-anchor="middle">MCP bridge</text>
    <text x="745" y="627" fill="#94a3b8" font-size="9" text-anchor="middle">Proxy tool calls</text>
    <text x="745" y="649" fill="#3fb950" font-size="8" text-anchor="middle">MCPPlugin</text>

    <rect x="850" y="575" width="170" height="90" rx="8" fill="rgba(88, 166, 255, 0.12)" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="935" y="597" fill="#58a6ff" font-size="13" font-weight="700" text-anchor="middle">subagents</text>
    <text x="935" y="613" fill="#94a3b8" font-size="9" text-anchor="middle">Multi-agent orchestration</text>
    <text x="935" y="627" fill="#94a3b8" font-size="9" text-anchor="middle">spawn · delegate · merge</text>
    <text x="935" y="649" fill="#58a6ff" font-size="8" text-anchor="middle">SubagentPlugin</text>

    <!-- Legend -->
    <rect x="60" y="690" width="980" height="26" rx="4" fill="rgba(15, 23, 42, 0.8)" stroke="#1e293b" stroke-width="1"/>
    <text x="80" y="708" fill="#94a3b8" font-size="9">Agent/Client</text>
    <rect x="180" y="700" width="10" height="10" rx="2" fill="rgba(188, 140, 255, 0.15)" stroke="#bc8cff" stroke-width="1"/>
    <text x="200" y="708" fill="#94a3b8" font-size="9">Protocol</text>
    <rect x="280" y="700" width="10" height="10" rx="2" fill="rgba(88, 166, 255, 0.12)" stroke="#58a6ff" stroke-width="1"/>
    <text x="300" y="708" fill="#94a3b8" font-size="9">Runtime</text>
    <rect x="380" y="700" width="10" height="10" rx="2" fill="rgba(63, 185, 80, 0.12)" stroke="#3fb950" stroke-width="1"/>
    <text x="400" y="708" fill="#94a3b8" font-size="9">Capabilities</text>
    <rect x="500" y="700" width="10" height="10" rx="2" fill="rgba(210, 153, 34, 0.12)" stroke="#d29922" stroke-width="1"/>

    <text x="610" y="708" fill="#475569" font-size="9">github.com/a2eprotocol/python-sdk · MIT License</text>
  </svg>

  <div id="fullscreen-btn" title="Full screen" onclick="toggleFullscreen()">⛶</div>
  <div id="fullscreen-hint">Click diagram or button for full screen</div>

  <script>
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.body.classList.add('fs-hint-hidden');
      } else {
        document.exitFullscreen();
      }
    }
    document.querySelector('svg').addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', function() {
      if (!document.fullscreenElement) {
        setTimeout(function() {
          document.body.classList.remove('fs-hint-hidden');
        }, 3000);
      }
    });
    // Hide hint after 5s
    setTimeout(function() {
      document.body.classList.add('fs-hint-hidden');
    }, 5000);
  </script>
</body>
</html>
